version: 1

# Read API v2 behavior knobs. Keep this config-driven so we can tune without code changes.
matchup_model:
  # How many completed matches to use (endpoint will clamp to this max)
  max_last_n: 10

  # Completed fixture statuses to include for history
  final_statuses: ["FT", "AET", "PEN"]

  # Robust anomaly detection on total goals per match using MAD-based z-score.
  anomaly_z_threshold: 2.5
  anomaly_weight_floor: 0.35

  # Recency weighting half-life expressed in "matches" (not days).
  # Example: half_life_matches=3 => 4th most recent match weight ~= 0.5
  recency_half_life_matches: 3.0

  # Opponent-strength adjustment baseline.
  # Opponent strength is derived from last5 form points (W=3,D=1,L=0), range 0..15.
  opponent_points_baseline: 7.0
  opponent_factor_min: 0.6
  opponent_factor_max: 1.6

  # Home advantage multiplier applied to lambda_home
  home_advantage: 1.10

  # Poisson scoreline enumeration parameters
  baseline_goals_per_team: 1.35
  lambda_min: 0.2
  lambda_max: 4.0
  max_goals: 6

  # Ensure "unexpected" still has non-trivial probability mass.
  min_prob_unexpected: 0.02

  # Prefer split rates (home/away) only if enough samples exist in the window.
  min_matches_for_split: 2


fixture_insights:
  # Windows are expressed in number of completed matches (not days).
  # last10 is used for more stable indices; last5 is used for recent form/trend.
  last5_n: 5
  last10_n: 10

  # Minimum completed matches required to consider indices "stable".
  # If played < min_matches_for_scores => endpoint returns warnings for that context.
  min_matches_for_scores: 3

  # Completed fixture statuses to include in history (no leakage: strictly before kickoff).
  final_statuses: ["FT", "AET", "PEN"]

  # Event time thresholds (minutes, API-Football elapsed):
  first_half_max_minute: 45
  late_goal_from_minute: 76

  # Index weights (all config-driven; endpoint will ignore missing components).
  weights:
    attack:
      goals: 0.5          # gf_avg (goals for per match)
      corners: 0.3        # corner_kicks_avg
      offsides: 0.2       # offsides_avg
      shots_on_goal: 0.0  # optional add-on (0 keeps parity with initial formula)
    defense:
      ga_avg: 0.45                # lower is better (invert in normalization)
      clean_sheet_rate_pct: 0.35  # higher is better
      corners_against_avg: 0.10   # lower is better (invert)
      yellow_cards_avg: 0.07      # lower is better (invert)
      red_cards_avg: 0.03         # lower is better (invert)
    form:
      form_points: 0.60       # last5 points (W=3,D=1,L=0) => 0..15
      goal_diff: 0.25         # goal_diff_per_match (cap/normalize)
      opponent_strength: 0.15 # opponent_strength avg_points_last5 (0..15)
    winning_drive:
      late_goal_rate_pct: 0.45      # % of matches with a goal scored from late_goal_from_minute..FT
      win_streak: 0.35              # consecutive wins from most-recent backwards
      second_half_goal_diff: 0.20   # second_half_goal_diff_per_match (cap/normalize)

  # Normalization ranges for clamp-linear 0..10 scores.
  # Each metric defines min/max and optionally invert=true (higher raw => lower score).
  normalization:
    # Attack components
    gf_avg: { min: 0.0, max: 3.0 }
    corner_kicks_avg: { min: 0.0, max: 8.0 }
    offsides_avg: { min: 0.0, max: 4.0 }
    shots_on_goal_avg: { min: 0.0, max: 7.0 }

    # Defense components
    ga_avg: { min: 0.0, max: 3.5, invert: true }
    clean_sheet_rate_pct: { min: 0.0, max: 100.0 }
    corners_against_avg: { min: 0.0, max: 8.0, invert: true }
    yellow_cards_avg: { min: 0.0, max: 4.0, invert: true }
    red_cards_avg: { min: 0.0, max: 1.0, invert: true }

    # Form components
    form_points_last5: { min: 0.0, max: 15.0 }
    goal_diff_per_match: { min: -2.0, max: 2.0 }
    opponent_strength_points: { min: 0.0, max: 15.0 }

    # Winning drive components
    late_goal_rate_pct: { min: 0.0, max: 100.0 }
    win_streak: { min: 0.0, max: 5.0 }
    second_half_goal_diff_per_match: { min: -2.0, max: 2.0 }

  # Optional totals model (Over/Under helper) computed from selected contexts only:
  # - home team uses home_context.last10, away team uses away_context.last10
  # - Base lambdas:
  #   λ_home = (home_gf_avg + away_ga_avg) / 2
  #   λ_away = (away_gf_avg + home_ga_avg) / 2
  # - Optional strength multipliers from indices_0_10:
  #   λ_home *= mult( home.attack_strength ) * mult( away.defensive_solidity )
  #   λ_away *= mult( away.attack_strength ) * mult( home.defensive_solidity )
  # - Probability:
  #   P(Over 2.5) = 1 - [P(0)+P(1)+P(2)] where P(k) is Poisson(λ_total)
  over25_model:
    enabled: true
    use_indices: true

    # 0..10 -> multiplier mapping (linear).
    # With defaults, score=5 => ~1.0, score=0 => 0.85, score=10 => 1.15 for attack.
    attack_mult_min: 0.85
    attack_mult_max: 1.15

    # Defensive solidity: higher score means stronger defense => lower opponent λ.
    # With defaults, score=0 => 1.15 (weak defense => more goals), score=10 => 0.85 (strong defense => fewer goals).
    defense_mult_min: 1.15
    defense_mult_max: 0.85

    # Safety cap to avoid extreme λ_total producing near-1 probabilities from bad data.
    lambda_total_cap: 8.0
