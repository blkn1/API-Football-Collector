# Manual overrides for league resolution.
#
# Use this when `resolve_tracked_leagues.py` cannot confidently match a target to an API league.
# Only overrides for leagues in the 67 full-coverage tracked list are kept.
#
# Format (recommended: list form, supports season override):
# overrides:
#   - source: "Display name or API variant"
#     league_id: 123
#     season: 2025   # optional
overrides:
  # World competitions (explicit IDs to avoid wrong country match)
  - source: "UEFA Champions League"
    league_id: 2
  - source: "UEFA Europa League"
    league_id: 3
  - source: "AFC Champions League"
    league_id: 17
  - source: "UEFA Europa Conference League"
    league_id: 848
  # Low-confidence / ambiguous names (67 full-coverage list)
  - source: "İngiltere EFL Trophy"
    league_id: 46
  - source: "Belçika 2. Lig"
    league_id: 145
  - source: "İngiltere 1. Lig"
    league_id: 41
  - source: "İngiltere 2. Lig"
    league_id: 42
  # Resolver suggestions for 67 full-coverage leagues (avoid low-confidence mis-wiring)
  - source: "Meksika Primera Ligi (Açılış Playoff)"
    league_id: 262
  - source: "Peru Primera Ligi (Büyük Final)"
    league_id: 281
  - source: "Avustralya A-Ligi"
    league_id: 188
  - source: "Romanya 1. Lig"
    league_id: 283
